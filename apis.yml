    type: OpenAPI
  description: OAuth2-style token endpoint at secure-wms.com/AuthServer. A Base64
    Client ID:Client Secret authorization header plus a grant_type mints a short-lived
    bearer access token (typically valid 30-60 minutes) that authorizes all other
    3PL Warehouse Manager REST API calls.
