aid: extensiv
url: https://raw.githubusercontent.com/api-evangelist/extensiv/refs/heads/main/apis.yml
name: Extensiv
kind: company
description: Extensiv (formerly 3PL Central, rebranded in 2022) is a cloud-native
  omnichannel fulfillment software company for third-party logistics providers (3PLs)
  and brands. Its platform combines warehouse management (3PL Warehouse Manager and
  Warehouse Manager), order management, inventory management, and integration
  tooling - built from the combination of 3PL Central, Skubana, Scout, and CartRover.
  The flagship developer surface is the 3PL Warehouse Manager REST API (auth server
  at secure-wms.com/AuthServer), which exposes orders, inventory, items, customers,
  receivers/ASN, stock summaries, and warehouses to external integrators. Access is
  provisioned with Client ID / Client Secret credentials that mint short-lived
  bearer tokens. NOTE - the SecureWMS/3PL Warehouse Manager REST API itself is
  documented in more detail in the sibling all/3plcentral entry; this entry profiles
  the Extensiv company and platform and its relationship to that API.
