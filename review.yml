  - url: https://help.extensiv.com/rest-api/providing-rest-api-access
    type: Documentation
    note: Base64 authorization header (ClientID:ClientSecret); token required in HTTP header; token valid ~30-60 min; HTTPS only; request access via api@extensiv.com.
  - url: https://developer.extensiv.com/pages/3pl-wareshouse-manager.html
    type: APIReference
    note: 3PL Warehouse Manager API reference (JavaScript-rendered developer portal; effectively gated to crawlers).
  - url: https://www.extensiv.com/newsroom/3pl-central-rebrands-as-extensiv
    type: Announcement
    note: 2022 rebrand of 3PL Central to Extensiv.
  - url: https://developer.3plcentral.com/
    type: APIReference
    note: Legacy 3PL Central REST API portal (pre-rebrand host).
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Extensiv's own API. Extensiv's public
    developer interface is request/response REST over HTTPS (3PL Warehouse
    Manager REST API) with an OAuth2-style token endpoint. No AsyncAPI document
    was created because there is no server-push transport (WebSocket or SSE) on
    Extensiv's own API to model. The SecureWMS / 3PL Warehouse Manager REST API
    itself is profiled in more detail in the sibling all/3plcentral entry; this
    entry focuses on the Extensiv company/platform.
